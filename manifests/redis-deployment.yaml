apiVersion: apps/v1
kind: Deployment
metadata:
  name: hytis-redis
  labels:
    app: hytis-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hytis-redis
  template:
    metadata:
      labels:
        app: hytis-redis
    spec:
      containers:
      - name: hytis-redis
        image: registry.redhat.io/rhel9/redis-7
        ports:
        - containerPort: 6379
