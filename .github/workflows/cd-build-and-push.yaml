name: Build and Push

on:
  workflow_call:
    inputs:
      target:
        description: "Deployment target used for image tag and cache"
        required: true
        type: string

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ghcr.io/hytis-ohtu/hytis:${{ inputs.target }}
            ghcr.io/hytis-ohtu/hytis:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/hytis-ohtu/hytis:${{ inputs.target }}cache
          cache-to: type=registry,ref=ghcr.io/hytis-ohtu/hytis:${{ inputs.target }}cache,mode=max
