codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: false

coverage:
  status:
    project:
      backend:
        target: 80%
        flags:
          - backend
      frontend:
        target: 80%
        flags:
          - frontend

    patch:
      backend:
        target: 80%
        flags:
          - backend
      frontend:
        target: 80%
        flags:
          - frontend

comment:
  layout: "diff, flags, files"
  # after_n_builds: 2
  hide_project_coverage: false

flags:
  frontend:
    paths:
      - frontend/
  backend:
    paths:
      - backend/
